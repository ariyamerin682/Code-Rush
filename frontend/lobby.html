<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Game Lobby</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-yellow: #f8be14;
            --bg-dark: #0f172a;
            --bg-deep: #0B1120;
            /* Deeper navy background */
            --card-glass: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --accent-cyan: #00f2ff;
            --accent-orange: #ff9a3c;
            --btn-green: #10b981;
            --btn-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D PERSPECTIVE GRID BACKGROUND (Pure CSS) */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 70%);
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            bottom: -50%;
            left: -50%;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(75deg);
            transform-origin: center bottom;
            animation: gridMove 20s linear infinite;
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 70%;
            background: linear-gradient(to bottom, #000 0%, transparent 100%);
            z-index: 1;
        }

        @keyframes gridMove {
            0% {
                transform: rotateX(75deg) translateY(0);
            }

            100% {
                transform: rotateX(75deg) translateY(50px);
            }
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            background: linear-gradient(270deg, #ff0080, #7928ca, #00dfd8);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            letter-spacing: -0.5px;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid transparent;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-create {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        /* MAIN HERO/TITLE AREA */
        .lobby-hero {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .lobby-hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .lobby-hero p {
            color: var(--text-gray);
            font-size: 16px;
        }

        /* ROOM LIST (CODEFORCES/DRIBBBLE GRID) */
        .room-container {
            padding: 0 40px 60px;
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .room-card {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Hover Glow Effect */
        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .room-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 4px;
        }

        .room-host {
            font-size: 13px;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .room-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .player-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-gray);
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .player-count span {
            color: var(--primary-yellow);
            font-weight: 600;
        }

        .join-btn {
            background: var(--btn-green);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .join-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--card-glass);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state h3 {
            color: var(--text-gray);
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-deep);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text-white);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 6px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-content input:focus {
            border-color: var(--accent-cyan);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
    </style>
    <!-- Include Vanilla-Tilt JS from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <!-- IFRAME DETECTOR (Hides external shell if embedded in app.html) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) {
                // We are inside an iframe (app.html Dashboard)
                // Hide header navs
                const headers = document.querySelectorAll('header');
                headers.forEach(h => h.style.display = 'none');

                // Hide duplicated 3D grid
                const grids = document.querySelectorAll('.grid-bg');
                grids.forEach(g => g.style.display = 'none');

                // Adjust body padding to reclaim lost space
                document.body.style.paddingTop = '10px';
                document.body.style.background = 'transparent';
            }
        });
    </script>

</head>

<body>
    <div class="grid-bg"></div>

    <header>
        <a href="zoom (1).html" class="logo">CodeRush</a>

        <div class="nav-links">
            <a href="zoom (1).html" class="nav-btn">Home</a>
            <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
            <a href="javascript:void(0)" id="profileBtn" title="CodeRush Profile" style="text-decoration: none; margin-left: 10px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #00f2ff, #7928ca); padding: 2px; box-shadow: 0 4px 15px rgba(121, 40, 202, 0.3); transition: transform 0.2s;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    <div
                        style="width: 100%; height: 100%; border-radius: 50%; background: #0f172a; display: flex; align-items: center; justify-content: center; color: white;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>
            </a>
            
            <a href="#" onclick="openHelpModal()" title="Help / Feedback / Report" style="text-decoration: none; margin-left: 10px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #ff9a3c, #f8be14); padding: 2px; box-shadow: 0 4px 15px rgba(248, 190, 20, 0.3); transition: transform 0.2s;"
                    onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    <div style="width: 100%; height: 100%; border-radius: 50%; background: #0f172a; display: flex; align-items: center; justify-content: center; color: white;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                </div>
            </a>
            <a href="admin.html" id="adminPanelBtn" class="nav-btn" style="display:none; background:rgba(124,58,237,0.15); color:#a78bfa; border:1px solid rgba(124,58,237,0.3);"><i class="fa-solid fa-shield-halved"></i> Admin Panel</a>
            <button class="btn-create" onclick="openModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Create Room
            </button>
        </div>
    </header>

    <div class="lobby-hero">
        <h1>Active Contests</h1>
        <p>Join a live coding battle or create your own room to challenge others.</p>
    </div>

    <div class="room-container" id="roomList">
        <!-- Rooms inserted here -->
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Create a New Arena</h3>

            <div class="input-group">
                <label>Room Name</label>
                <input type="text" id="roomName" placeholder="e.g. Master Coders Only">
            </div>

            <div class="input-group">
                <label>Max Players</label>
                <input type="number" id="maxPlayers" placeholder="8" value="8" min="2" max="16">
            </div>

            <div class="input-group">
                <label>Difficulty</label>
                <select id="difficulty" style="width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s;">
                    <option value="Easy" style="background:#0f172a">Easy (4 mins)</option>
                    <option value="Medium" style="background:#0f172a" selected>Medium (15 mins)</option>
                    <option value="Hard" style="background:#0f172a">Hard (25 mins)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-create" style="width: 100%; justify-content: center;" onclick="createRoom()">Launch
                    Room</button>
            </div>
        </div>
    </div>

    <!-- HELP MODAL -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <h3>Support & Feedback</h3>

            <div class="input-group">
                <label>What do you want to submit?</label>
                <select id="reportType" style="width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s;">
                    <option value="Feedback" style="background:#0f172a">General Feedback</option>
                    <option value="Report" style="background:#0f172a">Report an Issue/Player</option>
                    <option value="Alert" style="background:#0f172a">Moderation Alert</option>
                </select>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="reportDescription" rows="4" placeholder="Tell us what happened..." style="width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s; resize: none;"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeHelpModal()">Cancel</button>
                <button class="btn-create" style="width: 100%; justify-content: center; background: linear-gradient(135deg, #ff9a3c, #f8be14);" onclick="submitReport()">Submit</button>
            </div>
        </div>
    </div>

    <script>
        // AUTH GUARD
        const currentUser = sessionStorage.getItem("coderush_user");
        const currentRole = sessionStorage.getItem("coderush_role");
        if (!currentUser) {
            alert("You must be logged in to access the Lobby!");
            window.location.href = "auth.html";
        }

        const createBtn = document.querySelector('.btn-create');
        const helpLink = document.querySelector('a[onclick="openHelpModal()"]');

        if (currentRole === 'admin') {
            document.getElementById("profileBtn").onclick = function(e) {
                window.location.href = "admin.html";
            };
            if (createBtn) createBtn.style.display = "none";
            if (helpLink) helpLink.style.display = "none";
        } else {
            document.getElementById("profileBtn").onclick = function(e) {
                window.location.href = "profile.html";
            };
        }

        /* ======================
           MODAL FUNCTIONS
        ====================== */

        function openModal() {
            const modal = document.getElementById("modal");
            modal.style.display = "flex";
            // slight delay to allow display flex to apply before opacity transition
            setTimeout(() => modal.classList.add("active"), 10);
        }

        function closeModal() {
            const modal = document.getElementById("modal");
            modal.classList.remove("active");
            setTimeout(() => modal.style.display = "none", 300);
        }

        /* ======================
           HELP MODAL FUNCTIONS
        ====================== */
        function openHelpModal() {
            const modal = document.getElementById("helpModal");
            modal.style.display = "flex";
            setTimeout(() => modal.classList.add("active"), 10);
        }

        function closeHelpModal() {
            const modal = document.getElementById("helpModal");
            modal.classList.remove("active");
            setTimeout(() => modal.style.display = "none", 300);
            document.getElementById("reportDescription").value = "";
        }

        function submitReport() {
            const type = document.getElementById("reportType").value;
            const description = document.getElementById("reportDescription").value.trim();

            if (!description) {
                alert("Please provide a description.");
                return;
            }

            fetch(`http://${window.location.hostname || 'localhost'}:5000/api/moderators/reports`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    reportedBy: currentUser || "Guest",
                    type: type,
                    description: description
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("Thank you! Your " + type.toLowerCase() + " has been submitted to the admin team.");
                    closeHelpModal();
                } else {
                    alert(data.msg || "Error submitting report");
                }
            })
            .catch(err => {
                console.error(err);
                alert("Failed to submit. Please check your connection.");
            });
        }

        /* ======================
           LOAD ROOMS
        ====================== */

        function loadRooms() {
            fetch(`http://${window.location.hostname || 'localhost'}:5000/api/rooms`)
                .then(res => res.json())
                .then(rooms => {
                    const roomList = document.getElementById("roomList");
                    roomList.innerHTML = "";

                    if (rooms.length === 0) {
                        roomList.innerHTML = `
                            <div class="empty-state">
                                <h3>No active contests right now</h3>
                                <p style="color:var(--text-gray); font-size:14px;">Be the first to create a room and challenge others!</p>
                            </div>`;
                        return;
                    }

                    rooms.forEach(room => {
                        const playerCount = room.players?.length || 0;
                        roomList.innerHTML += `
                            <div class="room-card" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2">
                                <div>
                                    <div class="room-header">
                                        <div class="room-title">🚀 ${room.roomId}</div>
                                    </div>
                                    <div class="room-host">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
                                        </svg>
                                        Live Match
                                    </div>
                                </div>
                                <div class="room-meta">
                                    <div class="player-count">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                            <circle cx="9" cy="7" r="4"></circle>
                                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                                        </svg>
                                        <span>${playerCount}</span> / 8
                                    </div>
                                    <button class="join-btn" onclick="joinRoom('${room.roomId}')">Join Arena</button>
                                </div>
                            </div>`;
                    });

                    // Initialize tilt
                    VanillaTilt.init(document.querySelectorAll(".room-card"));
                })
                .catch(err => console.error("Could not load rooms:", err));
        }

        // Load rooms on page start
        loadRooms();
        setInterval(loadRooms, 5000); // refresh every 5s

        /* ======================
           CREATE ROOM
        ====================== */

        function createRoom() {
            const name = document.getElementById("roomName").value.trim();
            const maxPlayers = document.getElementById("maxPlayers").value;
            const difficulty = document.getElementById("difficulty").value;

            if (name === "" || maxPlayers === "") {
                alert("Please fill all fields");
                return;
            }

            fetch(`http://${window.location.hostname || 'localhost'}:5000/api/rooms/create`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ roomName: name, maxPlayers, difficulty, username: currentUser })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        sessionStorage.setItem("coderush_user", currentUser);
                        window.location.href = "room.html?room=" + encodeURIComponent(name);
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(err => console.error(err));
        }

        /* ======================
           JOIN ROOM
        ====================== */

        function joinRoom(name) {
            fetch(`http://${window.location.hostname || 'localhost'}:5000/api/rooms/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ roomName: name, username: currentUser })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success" || data.status === "already_joined") {
                        sessionStorage.setItem("coderush_user", currentUser); // Refresh just in case
                        window.location.href = "room.html?room=" + encodeURIComponent(name);
                    } else {
                        alert(data.msg || "Error joining room");
                    }
                })
                .catch(err => console.error(err));
        }

    </script>

    <!-- ULTIMATE WOW FACTOR - Cursor Glow & Transitions & Scrollbars -->
    <div class="cursor-glow"></div>
    <style>
        /* Smooth Page Load Transition */
        body {
            animation: globalFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes globalFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
                filter: blur(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Cursor Spotlight */
        .cursor-glow {
            position: fixed;
            top: -300px;
            left: -300px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, rgba(121, 40, 202, 0.05) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: top 0.1s ease-out, left 0.1s ease-out;
        }

        /* Global Neon Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 255, 0.3);
            border-radius: 5px;
            border: 2px solid #000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 255, 0.6);
        }

        /* Interactive Button Ripple/Pulse globally */
        button {
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            opacity: 0;
            transition: transform 0.4s, opacity 0.4s;
        }

        button:active::after {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            transition: 0s;
        }
    </style>
    <script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.cursor-glow');
            if (glow) {
                requestAnimationFrame(() => {
                    glow.style.top = (e.clientY - 300) + 'px';
                    glow.style.left = (e.clientX - 300) + 'px';
                });
            }
        });
    </script>

</body>

</html>
